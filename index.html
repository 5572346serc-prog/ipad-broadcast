<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad 廣播接收系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { background: white; max-width: 600px; margin: 40px auto; padding: 40px 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2px solid #eef2f7; }
        .title { font-size: 1.8rem; margin-bottom: 30px; color: #2c3e50; font-weight: bold; }
        .label { color: #888; font-size: 1.1rem; letter-spacing: 2px; }
        .broadcast-display { font-size: 3rem; font-weight: 900; color: #d63031; margin: 20px 0; line-height: 1.4; word-break: break-all; }
        .status { font-size: 0.8rem; color: #bbb; margin-top: 30px; }
        .active { background-color: #fff9c4; transition: 0.5s; }
    </style>
</head>
<body id="bodyTag">

<div class="container">
    <div id="roomTitle" class="title">正在初始化...</div>
    <div class="label">📣 最新廣播內容</div>
    <div id="broadcastContent" class="broadcast-display">等待訊息中...</div>
    <div id="targetInfo" style="color: #0984e3; font-weight: bold;">--</div>
    <div class="status" id="connStatus">連線狀態：正在連線至 GAS...</div>
</div>

<script>
    // ======= 這裡一定要改！貼上你自己的 GAS 網址 =======
    const GAS_URL = "你的_GAS_網址"; 
    // =================================================

    const urlParams = new URLSearchParams(window.location.search);
    const myId = urlParams.get('id') || "1"; 
    document.getElementById('roomTitle').innerText = "第 " + myId + " 教室廣播端";

    let lastId = 0; 

    async function checkUpdate() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            if (data.status === "success") {
                document.getElementById('connStatus').innerText = "連線狀態：正常運作中";
                if (data.id > lastId) {
                    lastId = data.id;
                    // 這裡就是判斷「12一起」的核心邏輯
                    if (data.target === "全部" || data.target.includes(myId)) {
                        processBroadcast(data.text, data.target);
                    }
                }
            }
        } catch (err) {
            document.getElementById('connStatus').innerText = "連連線異常，重試中...";
        }
    }

    function processBroadcast(text, target) {
        document.getElementById('broadcastContent').innerText = text;
        document.getElementById('targetInfo').innerText = "發送對象：" + target;
        document.getElementById('bodyTag').classList.add('active');
        
        // 語音廣播
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);

        setTimeout(() => {
            document.getElementById('bodyTag').classList.remove('active');
        }, 15000);
    }

    setInterval(checkUpdate, 5000);
    checkUpdate();
</script>
</body>
</html>
