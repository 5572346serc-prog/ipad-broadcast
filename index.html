<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教室廣播接收器</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #007AFF; font-size: 40px; }
        .btn { padding: 20px 40px; font-size: 24px; background: #34c759; color: white; border: none; border-radius: 15px; cursor: pointer; }
        #status { margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="roomDisplay">載入中...</h1>
        <button id="startBtn" class="btn">點擊啟動監聽</button>
        <div id="status">尚未啟動</div>
    </div>

    <script>
        // 你的 Google 腳本網址
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzDhQfZxlA_DdvMjl4ZBhjqpYhXMzeP7mTH19pJk06nRSWXcFbrKN9w3HYvVWCD3xX/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const MY_ID = urlParams.get('id') || "未設定";
        document.getElementById('roomDisplay').innerText = "第 " + MY_ID + " 教室";

        // 這是用來記錄最後一次收到的 C2 數字
        let lastId = "";

        document.getElementById('startBtn').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('status').innerText = "監聽中...請勿關閉網頁";
            
            // 預熱語音清單
            window.speechSynthesis.getVoices();

            // 每 3 秒檢查一次，反應更快
            setInterval(() => {
                fetch(SCRIPT_URL + "?t=" + new Date().getTime())
                    .then(res => res.json())
                    .then(data => {
                        // 判斷是否為全體(4) 或 我的編號
                        // 使用 == 比較，避免字串與數字型態不同的問題
                        const isForMe = (data.target == "4" || data.target == MY_ID);
                        
                        // 判斷 ID (C2) 是否變動，有變動才開口
                        if (isForMe && data.id != lastId) {
                            lastId = data.id; 
                            speak(data.text);
                            document.getElementById('status').innerText = "最新廣播：" + data.text;
                        } else if (data.id != lastId) {
                            // 即使不是給我的，也要更新 ID 紀錄，免得下次誤觸
                            lastId = data.id;
                        }
                    })
                    .catch(err => console.error("抓取失敗:", err));
            }, 3000); 
        });

        function speak(msg) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(msg);
            
            // 挑選高品質人聲
            const voices = synth.getVoices();
            const bestVoice = voices.find(v => v.lang.includes('zh-TW') && v.name.includes('Premium')) || 
                              voices.find(v => v.lang.includes('zh-TW'));

            if (bestVoice) utter.voice = bestVoice;

            utter.lang = 'zh-TW';
            utter.rate = 0.75; // 語速：0.7 到 0.8 之間最像真人
            utter.pitch = 1.0; 
            
            synth.cancel(); // 唸新的之前先停止舊的，避免重疊
            synth.speak(utter);
        }
    </script>
</body>
</html>
