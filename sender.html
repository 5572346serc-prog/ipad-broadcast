<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣播發送台</title>
    <style>
        body { font-family: sans-serif; background: #e5e5ea; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #007AFF; text-align: center; }
        textarea { width: 100%; height: 120px; padding: 12px; box-sizing: border-box; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; }
        select, button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px; font-size: 18px; }
        button { background: #007AFF; color: white; border: none; font-weight: bold; }
    </script>
</head>
<body>
    <div class="card">
        <h2>📣 廣播發送台</h2>
        <textarea id="textInput" placeholder="請輸入廣播文字..."></textarea>
        <select id="targetSelect">
            <option value="4">📢 全體廣播 (4)</option>
            <option value="1">🏫 第 1 教室</option>
            <option value="2">🏫 第 2 教室</option>
            <option value="3">🏫 第 3 教室</option>
        </select>
        <button onclick="send()">🚀 立即發送</button>
        <div id="status" style="text-align:center; margin-top:10px;"></div>
    </div>
    <script>
        // 【注意】這裡請填入你的 Google 腳本網址
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzDhQfZxlA_DdvMjl4ZBhjqpYhXMzeP7mTH19pJk06nRSWXcFbrKN9w3HYvVWCD3xX/exec";

        function send() {
            const text = document.getElementById('textInput').value;
            const target = document.getElementById('targetSelect').value;
            if (!text) return;
            document.getElementById('status').innerText = "發送中...";
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ text: text, target: target })
            }).then(() => {
                document.getElementById('status').innerText = "✅ 已成功發送！";
                document.getElementById('textInput').value = "";
            });
        }
    </script>
</body>
</html>
